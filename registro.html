<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VentaConecta — Crear cuenta</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --navy: #0f1729;
  --navy-70: rgba(15,23,41,0.7);
  --navy-50: rgba(15,23,41,0.5);
  --navy-30: rgba(15,23,41,0.3);
  --navy-12: rgba(15,23,41,0.12);
  --navy-06: rgba(15,23,41,0.06);
  --navy-03: rgba(15,23,41,0.03);
  --orange: #e85d24;
  --orange-hover: #d14f1a;
  --orange-12: rgba(232,93,36,0.12);
  --orange-border: rgba(232,93,36,0.25);
  --green: #1a8c5e;
  --green-08: rgba(26,140,94,0.08);
  --green-border: rgba(26,140,94,0.2);
  --red: #d93025;
  --red-bg: #fef2f1;
  --red-border: rgba(217,48,37,0.15);
  --green-ok: #1a8c5e;
  --green-ok-bg: #f0faf5;
  --green-ok-border: rgba(26,140,94,0.15);
  --bg: #fafafa;
  --white: #ffffff;
  --border: rgba(15,23,41,0.08);
  --border-2: rgba(15,23,41,0.14);
  --serif: 'Instrument Serif', Georgia, serif;
  --sans: 'DM Sans', -apple-system, sans-serif;
}
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--navy);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 44px 40px;
  width: 100%;
  max-width: 460px;
  box-shadow: 0 4px 24px var(--navy-06);
}
.logo { font-family: var(--sans); font-weight: 700; font-size: 17px; letter-spacing: -0.4px; text-align: center; margin-bottom: 8px; }
.logo span { color: var(--orange); }
.title { font-family: var(--serif); font-size: 28px; text-align: center; letter-spacing: -0.5px; margin-bottom: 28px; }

.type-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.type-btn {
  padding: 16px 14px;
  background: var(--bg);
  border: 1.5px solid var(--border-2);
  border-radius: 12px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.type-btn:hover { border-color: var(--navy-30); }
.type-btn.sel-comercio { background: var(--orange-12); border-color: var(--orange-border); }
.type-btn.sel-vendedor { background: var(--green-08); border-color: var(--green-border); }
.type-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px;
}
.ti-navy { background: var(--navy-06); }
.ti-green { background: var(--green-08); }
.type-name { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
.type-desc { font-size: 12px; color: var(--navy-50); line-height: 1.4; }

.form-group { margin-bottom: 14px; }
.form-label { font-size: 13px; font-weight: 500; color: var(--navy-50); margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; background: var(--bg); border: 1px solid var(--border-2); border-radius: 10px;
  padding: 12px 14px; color: var(--navy); font-family: var(--sans); font-size: 15px; outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form-input:focus { border-color: var(--navy-30); box-shadow: 0 0 0 3px var(--navy-06); }
.form-input::placeholder { color: var(--navy-30); }

.fields-comercio, .fields-vendedor { display: none; }
.fields-comercio.show, .fields-vendedor.show { display: block; }

.btn-submit {
  width: 100%; padding: 13px; background: var(--navy); color: var(--white);
  font-family: var(--sans); font-weight: 600; font-size: 15px;
  border: none; border-radius: 10px; cursor: pointer; transition: all 0.15s; margin-top: 4px;
}
.btn-submit:hover:not(:disabled) { background: var(--navy-70); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-submit.orange { background: var(--orange); }
.btn-submit.orange:hover:not(:disabled) { background: var(--orange-hover); }

.error-msg {
  background: var(--red-bg); border: 1px solid var(--red-border); border-radius: 10px;
  padding: 11px 14px; font-size: 14px; color: var(--red); margin-bottom: 16px; display: none;
}
.error-msg.show { display: block; }
.success-msg {
  background: var(--green-ok-bg); border: 1px solid var(--green-ok-border); border-radius: 10px;
  padding: 11px 14px; font-size: 14px; color: var(--green-ok); margin-bottom: 16px; display: none;
}
.success-msg.show { display: block; }

.links { text-align: center; margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
.links a { font-size: 14px; color: var(--navy-50); text-decoration: none; transition: color 0.15s; }
.links a:hover { color: var(--navy); }
.links a strong { color: var(--orange); font-weight: 600; }

.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 440px) {
  .card { padding: 32px 24px; }
  .title { font-size: 24px; }
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Venta<span>Conecta</span></div>
  <div class="title">Crear cuenta gratis</div>

  <div class="type-select">
    <div class="type-btn" id="btn-comercio" onclick="selectType('comercio')">
      <div class="type-icon ti-navy">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f1729" stroke-width="1.7" stroke-linecap="round"><path d="M3 9l1-5h16l1 5"/><path d="M5 11v8h14v-8"/><path d="M10 15h4v4h-4z"/></svg>
      </div>
      <div class="type-name">Comercio</div>
      <div class="type-desc">Publica productos y recibe clientes</div>
    </div>
    <div class="type-btn" id="btn-vendedor" onclick="selectType('vendedor')">
      <div class="type-icon ti-green">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a8c5e" stroke-width="1.7" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
      <div class="type-name">Vendedor</div>
      <div class="type-desc">Gana comisiones sin inventario</div>
    </div>
  </div>

  <div id="errorMsg" class="error-msg"></div>
  <div id="successMsg" class="success-msg"></div>

  <div id="commonFields" style="display:none;">
    <div class="form-group">
      <label class="form-label">Correo electronico</label>
      <input class="form-input" type="email" id="email" placeholder="tu@correo.com">
    </div>
    <div class="form-group">
      <label class="form-label">Telefono</label>
      <input class="form-input" type="tel" id="phone" placeholder="664 123 4567">
    </div>
    <div class="form-group">
      <label class="form-label">Contrasena</label>
      <input class="form-input" type="password" id="password" placeholder="Minimo 6 caracteres">
    </div>
    <div class="fields-comercio" id="fieldsComerco">
      <div class="form-group">
        <label class="form-label">Nombre del negocio</label>
        <input class="form-input" type="text" id="businessName" placeholder="Ej. Muebles Garcia">
      </div>
      <div class="form-group">
        <label class="form-label">Direccion del negocio</label>
        <input class="form-input" type="text" id="businessAddress" placeholder="Ej. Blvd. Sanchez Taboada 1234, Tijuana">
      </div>
    </div>
    <div class="fields-vendedor" id="fieldsVendedor">
      <div class="form-group">
        <label class="form-label">Nombre completo</label>
        <input class="form-input" type="text" id="fullName" placeholder="Ej. Luis Ramirez">
      </div>
    </div>
    <button class="btn-submit" id="submitBtn" onclick="handleRegister()">Crear cuenta</button>
  </div>

  <div class="links">
    <a href="login.html">Ya tengo cuenta. <strong>Iniciar sesion</strong></a>
    <a href="index.html">Volver al inicio</a>
  </div>
</div>
<script>
const SUPABASE_URL='https://miiitegvpxoplanszido.supabase.co'
const SUPABASE_KEY='sb_publishable_uONmieVhZiope7XWhMnFHA_gQbIHF2w'
const {createClient}=supabase
const sb=createClient(SUPABASE_URL,SUPABASE_KEY)
let selectedType=null
function selectType(type){
  selectedType=type
  document.getElementById('btn-comercio').className='type-btn'+(type==='comercio'?' sel-comercio':'')
  document.getElementById('btn-vendedor').className='type-btn'+(type==='vendedor'?' sel-vendedor':'')
  document.getElementById('commonFields').style.display='block'
  document.getElementById('fieldsComerco').className='fields-comercio'+(type==='comercio'?' show':'')
  document.getElementById('fieldsVendedor').className='fields-vendedor'+(type==='vendedor'?' show':'')
  const btn=document.getElementById('submitBtn')
  btn.className='btn-submit'+(type==='comercio'?' orange':'')
  btn.textContent=type==='comercio'?'Registrar mi negocio':'Empezar a ganar'
}
async function handleRegister(){
  const errorMsg=document.getElementById('errorMsg'),successMsg=document.getElementById('successMsg')
  errorMsg.classList.remove('show');successMsg.classList.remove('show')
  if(!selectedType){showError('Selecciona si eres Comercio o Vendedor.');return}
  const email=document.getElementById('email').value.trim()
  const phone=document.getElementById('phone').value.trim()
  const password=document.getElementById('password').value
  if(!email||!password){showError('El correo y contrasena son obligatorios.');return}
  if(password.length<6){showError('La contrasena debe tener al menos 6 caracteres.');return}
  const btn=document.getElementById('submitBtn')
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Creando cuenta...'
  const {data,error}=await sb.auth.signUp({email,password})
  if(error){
    showError(error.message==='User already registered'?'Este correo ya esta registrado.':'Error al crear cuenta. Intenta de nuevo.')
    btn.disabled=false;btn.textContent=selectedType==='comercio'?'Registrar mi negocio':'Empezar a ganar';return
  }
  const userId=data.user.id
  const profileData={id:userId,email,phone,user_type:selectedType,active:true}
  if(selectedType==='comercio'){
    profileData.business_name=document.getElementById('businessName').value.trim()
    profileData.business_address=document.getElementById('businessAddress').value.trim()
  }else{
    profileData.full_name=document.getElementById('fullName').value.trim()
  }
  await sb.from('users').insert(profileData)

  if(selectedType==='comercio'){
    // Comercio: redirect to Stripe Checkout for $299/month subscription
    btn.innerHTML='<span class="spinner"></span>Preparando pago...'
    try{
      const session=await sb.auth.getSession()
      const resp=await fetch(SUPABASE_URL+'/functions/v1/create-checkout-session',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.data.session.access_token},
        body:JSON.stringify({
          success_url:window.location.origin+'/dashboard-comercio.html?subscribed=true',
          cancel_url:window.location.origin+'/registro.html?tipo=comercio&pending=true'
        })
      })
      const result=await resp.json()
      if(result.url){window.location.href=result.url;return}
    }catch(e){console.error('Stripe error:',e)}
    // Fallback if Stripe fails
    successMsg.textContent='Cuenta creada. Inicia sesion para activar tu suscripcion.'
    successMsg.classList.add('show');btn.textContent='Listo'
    setTimeout(()=>{window.location.href='login.html'},3000)
  }else{
    // Vendedor: just go to login, no payment needed
    successMsg.textContent='Cuenta creada. Revisa tu correo para confirmar y luego inicia sesion.'
    successMsg.classList.add('show');btn.textContent='Listo'
    setTimeout(()=>{window.location.href='login.html'},3000)
  }
}
function showError(msg){const el=document.getElementById('errorMsg');el.textContent=msg;el.classList.add('show')}
const params=new URLSearchParams(window.location.search)
if(params.get('tipo'))selectType(params.get('tipo'))
if(params.get('pending')){const el=document.getElementById('errorMsg');el.textContent='Tu cuenta fue creada pero necesitas suscribirte para activar tus productos. Inicia sesion para completar el pago.';el.classList.add('show')}
</script>
</body>
</html>
