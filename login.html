<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VentaConecta — Iniciar sesion</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --navy: #0f1729;
  --navy-70: rgba(15,23,41,0.7);
  --navy-50: rgba(15,23,41,0.5);
  --navy-30: rgba(15,23,41,0.3);
  --navy-12: rgba(15,23,41,0.12);
  --navy-06: rgba(15,23,41,0.06);
  --navy-03: rgba(15,23,41,0.03);
  --orange: #e85d24;
  --orange-hover: #d14f1a;
  --red: #d93025;
  --red-bg: #fef2f1;
  --red-border: rgba(217,48,37,0.15);
  --bg: #fafafa;
  --white: #ffffff;
  --border: rgba(15,23,41,0.08);
  --border-2: rgba(15,23,41,0.14);
  --serif: 'Instrument Serif', Georgia, serif;
  --sans: 'DM Sans', -apple-system, sans-serif;
}
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--navy);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 44px 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 4px 24px var(--navy-06);
}
.logo {
  font-family: var(--sans);
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.4px;
  text-align: center;
  margin-bottom: 8px;
}
.logo span { color: var(--orange); }
.title {
  font-family: var(--serif);
  font-size: 28px;
  text-align: center;
  letter-spacing: -0.5px;
  margin-bottom: 32px;
}
.form-group { margin-bottom: 16px; }
.form-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--navy-50);
  margin-bottom: 6px;
  display: block;
}
.form-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border-2);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--navy);
  font-family: var(--sans);
  font-size: 15px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form-input:focus {
  border-color: var(--navy-30);
  box-shadow: 0 0 0 3px var(--navy-06);
}
.form-input::placeholder { color: var(--navy-30); }
.btn-submit {
  width: 100%;
  padding: 13px;
  background: var(--navy);
  color: var(--white);
  font-family: var(--sans);
  font-weight: 600;
  font-size: 15px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 4px;
}
.btn-submit:hover:not(:disabled) {
  background: var(--navy-70);
}
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 24px 0;
}
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-text { font-size: 13px; color: var(--navy-30); }
.links {
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.links a {
  font-size: 14px;
  color: var(--navy-50);
  text-decoration: none;
  transition: color 0.15s;
}
.links a:hover { color: var(--navy); }
.links a strong { color: var(--orange); font-weight: 600; }
.error-msg {
  background: var(--red-bg);
  border: 1px solid var(--red-border);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 14px;
  color: var(--red);
  margin-bottom: 16px;
  display: none;
}
.error-msg.show { display: block; }
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 440px) {
  .card { padding: 32px 24px; }
  .title { font-size: 24px; }
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Venta<span>Conecta</span></div>
  <div class="title">Iniciar sesion</div>
  <div class="error-msg" id="errorMsg"></div>
  <div class="form-group">
    <label class="form-label">Correo electronico</label>
    <input class="form-input" type="email" id="email" placeholder="tu@correo.com">
  </div>
  <div class="form-group">
    <label class="form-label">Contrasena</label>
    <input class="form-input" type="password" id="password" placeholder="Tu contrasena">
  </div>
  <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Entrar</button>
  <div class="divider"><div class="divider-line"></div><div class="divider-text">o</div><div class="divider-line"></div></div>
  <div class="links">
    <a href="registro.html">Crear cuenta <strong>gratis</strong></a>
    <a href="index.html">Volver al inicio</a>
  </div>
</div>
<script>
const SUPABASE_URL='https://miiitegvpxoplanszido.supabase.co'
const SUPABASE_KEY='sb_publishable_uONmieVhZiope7XWhMnFHA_gQbIHF2w'
const {createClient}=supabase
const sb=createClient(SUPABASE_URL,SUPABASE_KEY)
async function checkSession(){
  const {data:{user}}=await sb.auth.getUser()
  if(user) redirectByType(user.id)
}
checkSession()
async function redirectByType(userId){
  const {data}=await sb.from('users').select('user_type').eq('id',userId).single()
  if(data?.user_type==='comercio') window.location.href='dashboard-comercio.html'
  else window.location.href='dashboard-vendedor.html'
}
async function handleLogin(){
  const email=document.getElementById('email').value.trim()
  const password=document.getElementById('password').value
  const btn=document.getElementById('loginBtn')
  const errMsg=document.getElementById('errorMsg')
  if(!email||!password){showError('Llena todos los campos.');return}
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Entrando...'
  errMsg.classList.remove('show')
  const {data,error}=await sb.auth.signInWithPassword({email,password})
  if(error){showError('Correo o contrasena incorrectos.');btn.disabled=false;btn.textContent='Entrar';return}
  await redirectByType(data.user.id)
}
function showError(msg){const el=document.getElementById('errorMsg');el.textContent=msg;el.classList.add('show')}
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin()})
</script>
</body>
</html>
